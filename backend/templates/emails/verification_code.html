<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ subject }}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background-color: #f4f6f8;
        color: #333333;
        -webkit-font-smoothing: antialiased;
      }
      .wrapper {
        width: 100%;
        background-color: #f4f6f8;
        padding: 40px 0;
      }
      .container {
        max-width: 460px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        overflow: hidden;
      }
      .header {
        padding: 32px 32px 0;
        text-align: center;
      }
      .logo {
        font-size: 22px;
        font-weight: 700;
        color: #2a7be4;
        letter-spacing: -0.5px;
        text-decoration: none;
      }
      .content {
        padding: 32px;
        text-align: center;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        color: #1f2937;
        margin: 0 0 16px;
      }
      .description {
        font-size: 14px;
        color: #6b7280;
        line-height: 1.6;
        margin: 0 0 24px;
      }
      .code-container {
        background-color: #f0f7ff;
        border: 1px dashed #a3caff;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 24px;
      }
      .code {
        font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
        font-size: 32px;
        font-weight: 700;
        color: #2a7be4;
        letter-spacing: 6px;
        margin: 0;
        line-height: 1;
      }
      .expiry {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 16px;
      }
      .footer {
        padding: 24px;
        background-color: #fafafa;
        text-align: center;
        border-top: 1px solid #f0f0f0;
      }
      .footer-text {
        font-size: 12px;
        color: #9ca3af;
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div class="header">
          <a href="#" class="logo">JuFireX</a>
        </div>
        <div class="content">
          <h2 class="title">{{ subject }}</h2>
          <p class="description">
            您正在进行身份验证，请使用下方的验证码完成操作。
          </p>
          <div class="code-container">
            <h1 class="code">{{ code }}</h1>
          </div>
          <p class="description" style="margin-bottom: 0; font-size: 13px">
            如果这不是您的操作，请忽略此邮件，您的账户安全不会受到影响。
          </p>
          <p class="expiry">验证码将在 15 分钟后失效</p>
        </div>
        <div class="footer">
          <p class="footer-text">&copy; 2026 JuFireX. All rights reserved.</p>
        </div>
      </div>
    </div>
  </body>
</html>
