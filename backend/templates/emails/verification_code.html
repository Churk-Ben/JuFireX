<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>验证码</title>
  </head>
  <body>
    <div
      style="
        font-family: Arial, sans-serif;
        padding: 20px;
        border: 1px solid #eee;
        border-radius: 5px;
      "
    >
      <h2 style="color: #333">欢迎注册 JuFireX</h2>
      <p>您的验证码是：</p>
      <div
        style="
          background-color: #f5f5f5;
          padding: 10px;
          text-align: center;
          border-radius: 4px;
        "
      >
        <h1 style="color: #4caf50; letter-spacing: 5px; margin: 0">
          {{ code }}
        </h1>
      </div>
      <p style="color: #666; font-size: 12px; margin-top: 20px">
        该验证码将在 15 分钟后失效。
      </p>
      <p style="color: #666; font-size: 12px">
        如果这不是您的操作，请忽略此邮件。
      </p>
    </div>
  </body>
</html>
