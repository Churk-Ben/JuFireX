services:
  jufirex-backend:
    build:
      context: .
      args:
        GIT_COMMIT_HASH: ${GIT_COMMIT_HASH:-}
        GIT_BRANCH: ${GIT_BRANCH:-}
        GIT_COMMIT_DATE: ${GIT_COMMIT_DATE:-}
    container_name: jufirex-backend
    restart: always
    env_file:
      - .env
    ports:
      # 映射到宿主机的 8000 端口
      # 1Panel 配置反向代理时可使用 http://127.0.0.1:8000
      - "127.0.0.1:8000:8000"
    volumes:
      # 挂载数据库目录，确保持久化
      - ./database:/app/database
      # 挂载日志目录
      - ./logs:/app/logs
      # 挂载环境变量文件
      - ./.env:/app/.env
      # 挂载版本标识
      - ./version:/app/version
    environment:
      - TZ=Asia/Shanghai